version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: school_lost_found_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: school_lost_found
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci'
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pld123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: school_lost_found_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=school_lost_found
      - DB_USER=root
      - DB_PASSWORD=ld123456

volumes:
  mysql_data:
  media_data:
