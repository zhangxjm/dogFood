version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: estore-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: estore
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  estore-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: estore-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: estore
      DB_USERNAME: root
      DB_PASSWORD: root
      JPA_DDL_AUTO: update
      JWT_SECRET: estore-jwt-secret-key-2024-docker-deployment-key
      JWT_EXPIRATION: 86400000
      WEIXIN_APP_ID: your-weixin-app-id
      WEIXIN_APP_SECRET: your-weixin-app-secret
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql

  estore-admin:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: estore-admin
    restart: always
    ports:
      - "80:80"
    depends_on:
      - estore-server
    links:
      - estore-server

volumes:
  mysql_data:
