version: '3.8'

services:
  ecommerce:
    build: .
    container_name: nuxt3-ecommerce
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:3001/api
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
