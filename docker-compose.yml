version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: admin_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: admin_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-authentication-plugin=mysql_native_password'
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pld123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admin_backend
    restart: always
    environment:
      - APP_PORT=3000
      - JWT_SECRET=admin-system-jwt-secret-key-2024
      - JWT_EXPIRES_IN=7d
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=ld123456
      - DB_DATABASE=admin_system
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=false
      - BCRYPT_SALT_ROUNDS=10
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: admin_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
