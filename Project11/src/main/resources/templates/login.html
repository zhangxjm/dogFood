<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>餐饮点餐收银系统 - 登录</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .login-header {
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        border-radius: 20px 20px 0 0;
        padding: 40px 30px;
        text-align: center;
      }
      .login-header h1 {
        color: white;
        margin: 0;
        font-size: 28px;
        font-weight: 600;
      }
      .login-header p {
        color: rgba(255, 255, 255, 0.8);
        margin: 10px 0 0 0;
        font-size: 14px;
      }
      .login-body {
        padding: 40px 30px;
      }
      .form-floating label {
        color: #6c757d;
      }
      .btn-login {
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        border: none;
        padding: 15px;
        font-size: 18px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(238, 90, 36, 0.3);
      }
      .alert {
        border-radius: 10px;
      }
      .restaurant-icon {
        font-size: 60px;
        color: white;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="login-card bg-white">
      <div class="login-header">
        <i class="bi bi-shop restaurant-icon"></i>
        <h1>餐饮点餐收银系统</h1>
        <p>Restaurant POS System</p>
      </div>
      <div class="login-body">
        <div
          th:if="${error}"
          class="alert alert-danger alert-dismissible fade show"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span th:text="${error}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>

        <form th:action="@{/login}" method="post">
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="请输入用户名"
              required
            />
            <label for="username">
              <i class="bi bi-person me-1"></i>用户名
            </label>
          </div>

          <div class="form-floating mb-4">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="请输入密码"
              required
            />
            <label for="password"> <i class="bi bi-lock me-1"></i>密码 </label>
          </div>

          <button
            type="submit"
            class="btn btn-login btn-primary w-100 rounded-pill"
          >
            <i class="bi bi-box-arrow-in-right me-2"></i>登录系统
          </button>
        </form>

        <div class="mt-4 text-center text-muted small">
          <p class="mb-1">演示账号：</p>
          <p class="mb-0">店长：admin / admin123</p>
          <p class="mb-0">收银员：cashier / admin123</p>
          <p class="mb-0">后厨：kitchen / admin123</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
