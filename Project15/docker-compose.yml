version: '3.8'

services:
  mysql:
    image: mysql:8.0.33
    container_name: job-recruitment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: job_recruitment
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-authentication-plugin=mysql_native_password'
    ]
    networks:
      - job-network
    restart: unless-stopped

networks:
  job-network:
    driver: bridge

volumes:
  mysql_data:
