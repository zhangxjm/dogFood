version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=property-management-secret-key-2024
      - JWT_SECRET_KEY=jwt-secret-key-2024

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=ld123456
      - MYSQL_DATABASE=property
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=property
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sqlite_data:
  mysql_data:
  postgres_data:
