server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: estore-server
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:estore}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:estore-jwt-secret-key-2024-very-long-secret-key-for-security}
  expiration: ${JWT_EXPIRATION:86400000}

weixin:
  app-id: ${WEIXIN_APP_ID:your-weixin-app-id}
  app-secret: ${WEIXIN_APP_SECRET:your-weixin-app-secret}

logging:
  level:
    com.estore: info
