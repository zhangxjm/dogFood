server:
  port: 8080

spring:
  application:
    name: seckill-gateway

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        shared-configs:
          - data-id: seckill-common.yaml
            group: DEFAULT_GROUP
            refresh: true

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: seckill-user
          uri: lb://seckill-user
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        - id: seckill-product
          uri: lb://seckill-product
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1

        - id: seckill-seckill
          uri: lb://seckill-seckill
          predicates:
            - Path=/seckill/**
          filters:
            - StripPrefix=1

        - id: seckill-order
          uri: lb://seckill-order
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

        - id: seckill-admin
          uri: lb://seckill-user
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origin-patterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

jwt:
  secret: seckill-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 604800000

gateway:
  white-list:
    - /user/login
    - /user/register
    - /admin/login
    - /product/list
    - /product/info
    - /product/detail
    - /product/category/**
    - /seckill/list
    - /seckill/detail
    - /seckill/stock
    - /error
    - /actuator/**
    - /swagger-ui/**
    - /swagger-resources/**
    - /v3/api-docs/**
    - /doc.html
    - /webjars/**

logging:
  level:
    com.seckill: debug
    org.springframework.cloud.gateway: debug

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
