server:
  port: 8080

spring:
  application:
    name: campus-trade

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ld123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: CampusTradeHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  web:
    resources:
      static-locations: classpath:/static/, file:${user.dir}/images/

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.campustrade.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: campus-trade-jwt-secret-key-2024-spring-boot-three-full-stack
  expiration: 86400000

file:
  upload:
    path: ./images/
    url-prefix: http://localhost:8080/images/
