version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=your-secret-key-change-in-production-12345
      - JWT_SECRET_KEY=your-jwt-secret-key-change-in-production-67890
      - DATABASE_URL=sqlite:///./data.db
    volumes:
      - ./backend:/app
      - sqlite_data:/app
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: data_management
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    profiles:
      - mysql

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: data_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    profiles:
      - postgres

volumes:
  sqlite_data:
  mysql_data:
  postgres_data:

networks:
  app-network:
    driver: bridge
