version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: device_monitor_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: device_monitor
      LANG: C.UTF-8
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
      --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pld123456"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
