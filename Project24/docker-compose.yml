version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: voting_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ld123456
      MYSQL_DATABASE: voting_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pld123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voting_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting_backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ld123456
      MYSQL_DATABASE: voting_system
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - voting_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voting_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - voting_network

volumes:
  mysql_data:

networks:
  voting_network:
    driver: bridge
